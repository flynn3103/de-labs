apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-operator
  namespace: de-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-operator
    spec:
      serviceAccountName: spark-operator
      containers:
      - name: spark-operator
        image: ghcr.io/googlecloudplatform/spark-operator:v1beta2-1.3.8-3.1.1
        # args:
        # - --enable-webhook=false
        # - --namespace=spark-operator
        # - --enable-metrics
        # - --metrics-port=10254
        # - --metrics-endpoint=/metrics
        # - --enable-ui-service=true
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "256Mi"
